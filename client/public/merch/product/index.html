<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KAJA Merch Product</title>
    <link rel="stylesheet" href="/heading-tuning.css" />
    <style>
      * { box-sizing: border-box; }
      :root { cursor: none; }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(circle at 80% 12%, rgba(255,255,255,.08), transparent 30%), #000;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: none;
      }
      a, button { cursor: none; }
      .cursor-ring,
      .cursor-dot {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        pointer-events: none;
        will-change: transform;
        mix-blend-mode: difference;
      }
      .cursor-ring { width: 54px; height: 54px; border: 1.5px solid #fff; border-radius: 999px; }
      .cursor-dot { width: 6px; height: 6px; border-radius: 999px; background: #fff; }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: clamp(18px, 4vw, 42px);
        background: rgba(0,0,0,.72);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,.10);
      }
      a { color: inherit; text-decoration: none; }
      .back {
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 11px;
        letter-spacing: .12em;
        text-transform: uppercase;
        transition: background .5s cubic-bezier(.22, 1, .36, 1), color .5s cubic-bezier(.22, 1, .36, 1), transform .5s cubic-bezier(.22, 1, .36, 1);
      }
      .back:hover { background: #fff; color: #000; transform: translateY(-2px); }
      .product-shell { padding: clamp(24px, 5vw, 64px); }
      .product-layout {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: clamp(28px, 4vw, 56px);
        align-items: start;
      }
      .product-visual {
        position: relative;
        aspect-ratio: 4 / 5;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 28px;
        overflow: hidden;
        background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.035));
        box-shadow: 0 34px 90px rgba(0,0,0,.42), inset 0 0 60px rgba(255,255,255,.03);
      }
      .product-visual img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .product-kicker {
        margin: 0 0 10px;
        color: rgba(255,255,255,.48);
        font-size: 13px;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      .product-copy h1 {
        margin: 0;
        font-size: clamp(34px, 7vw, 84px);
        line-height: .92;
        letter-spacing: -.05em;
      }
      .product-section {
        margin-top: clamp(22px, 3vw, 34px);
        padding-top: clamp(22px, 3vw, 34px);
        border-top: 1px solid rgba(255,255,255,.10);
      }
      .product-section h2 {
        margin: 0 0 14px;
        color: rgba(255,255,255,.48);
        font-size: 11px;
        letter-spacing: .16em;
        text-transform: uppercase;
        font-weight: 650;
      }
      .product-copy-text {
        margin: 0;
        max-width: 56ch;
        color: rgba(255,255,255,.72);
        font-size: clamp(15px, 2vw, 20px);
        line-height: 1.55;
      }
      .product-empty {
        color: rgba(255,255,255,.38);
        font-style: italic;
      }
      .product-loading {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: clamp(28px, 4vw, 56px);
        align-items: start;
      }
      .product-loading-block {
        border-radius: 28px;
        background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.05) 75%);
        background-size: 200% 100%;
        animation: product-shimmer 1.4s ease-in-out infinite;
      }
      .product-loading-image { aspect-ratio: 4 / 5; }
      .product-loading-copy { min-height: 280px; }
      @keyframes product-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .product-not-found-shell { padding: clamp(24px, 5vw, 64px); }
      .product-not-found {
        margin: 0;
        color: rgba(255,255,255,.62);
        font-size: clamp(18px, 3vw, 24px);
      }
      @media (max-width: 900px) {
        .product-layout,
        .product-loading { grid-template-columns: 1fr; }
        .product-visual { max-width: 420px; margin: 0 auto; width: 100%; }
      }
      @media (max-width: 700px) {
        :root, body, a, button { cursor: auto; }
        .cursor-ring, .cursor-dot { display: none; }
        header { align-items: flex-start; flex-direction: column; }
        .product-shell,
        .product-not-found-shell { padding: 20px 14px calc(34px + env(safe-area-inset-bottom)); }
        .product-visual { border-radius: 14px; }
        .product-loading-block { border-radius: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="cursor-ring" aria-hidden="true"></div>
    <div class="cursor-dot" aria-hidden="true"></div>
    <header>
      <a class="back" href="/merch" data-locale-merch data-i18n="productBack">← Back to merch</a>
      <span style="color:rgba(255,255,255,.48);font-size:12px;letter-spacing:.16em;text-transform:uppercase" data-i18n="navLabel">Merch</span>
    </header>

    <div class="product-shell" id="product-loading" aria-busy="true" aria-live="polite">
      <div class="product-loading">
        <div class="product-loading-block product-loading-image"></div>
        <div class="product-loading-block product-loading-copy"></div>
      </div>
    </div>

    <div class="product-shell" id="product-main" hidden>
      <article class="product-layout">
        <div class="product-visual" id="product-visual" hidden>
          <img id="product-image" src="" alt="" />
        </div>
        <div class="product-copy">
          <p class="product-kicker" id="product-label" data-i18n="productKicker">Merch</p>
          <h1 id="product-title"></h1>

          <section class="product-section" id="product-copy-section">
            <h2 data-i18n="productCopyLabel">Details</h2>
            <p class="product-copy-text" id="product-copy"></p>
          </section>
        </div>
      </article>
    </div>

    <div class="product-not-found-shell" id="product-not-found" hidden>
      <p class="product-not-found" data-i18n="productNotFound">Product not found.</p>
    </div>

    <script src="/merch-slug.js"></script>
    <script src="/locale-subpage.js"></script>
    <script src="/locale-page-links.js"></script>
    <script src="/merch-product-page.js"></script>
    <script src="/cursor-hover.js"></script>
    <script>
      const ring = document.querySelector('.cursor-ring');
      const dot = document.querySelector('.cursor-dot');
      const mouse = { x: innerWidth / 2, y: innerHeight / 2 };
      const pos = { x: mouse.x, y: mouse.y };
      const prev = { x: mouse.x, y: mouse.y };
      addEventListener('mousemove', (event) => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        if (dot) dot.style.transform = `translate3d(${event.clientX}px, ${event.clientY}px, 0) translate(-50%, -50%)`;
      });
      function tick() {
        pos.x += (mouse.x - pos.x) * 0.17;
        pos.y += (mouse.y - pos.y) * 0.17;
        const dx = mouse.x - prev.x;
        const dy = mouse.y - prev.y;
        const speed = Math.min(Math.hypot(dx, dy), 80);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const stretch = 1 + speed / 210;
        const squash = 1 - speed / 420;
        if (ring) ring.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0) translate(-50%, -50%) rotate(${angle}deg) scale(${stretch}, ${squash})`;
        prev.x += dx * 0.35;
        prev.y += dy * 0.35;
        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
