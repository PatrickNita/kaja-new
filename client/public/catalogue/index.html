<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KAJA Catalogue</title>
    <style>
      * { box-sizing: border-box; }
      :root { cursor: none; }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(circle at 20% 10%, rgba(255,255,255,.08), transparent 30%), #000;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: none;
      }
      a, button, .card { cursor: none; }
      .cursor-ring,
      .cursor-dot {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        pointer-events: none;
        will-change: transform;
        mix-blend-mode: difference;
      }
      .cursor-ring {
        width: 54px;
        height: 54px;
        border: 1.5px solid #fff;
        border-radius: 999px;
      }
      .cursor-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #fff;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: clamp(18px, 4vw, 42px);
        background: rgba(0,0,0,.72);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,.1);
      }
      a { color: inherit; text-decoration: none; }
      .back {
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 11px;
        letter-spacing: .12em;
        text-transform: uppercase;
        transition: background .5s cubic-bezier(.22, 1, .36, 1), color .5s cubic-bezier(.22, 1, .36, 1), transform .5s cubic-bezier(.22, 1, .36, 1);
      }
      .back:hover { background: #fff; color: #000; transform: translateY(-2px); }
      main { padding: clamp(24px, 5vw, 64px); }
      h1 {
        margin: 0;
        font-size: clamp(42px, 9vw, 124px);
        line-height: .9;
        letter-spacing: -.07em;
      }
      .lead {
        max-width: 720px;
        margin: 18px 0 42px;
        color: rgba(255,255,255,.62);
        font-size: clamp(15px, 2vw, 22px);
        line-height: 1.5;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(220px, 100%), 1fr));
        gap: clamp(14px, 2vw, 24px);
      }
      .card {
        aspect-ratio: 1 / 1;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 28px;
        background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.035));
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: clamp(16px, 2vw, 24px);
        box-shadow: 0 34px 90px rgba(0,0,0,.42), inset 0 0 60px rgba(255,255,255,.03);
        transition:
          background .78s cubic-bezier(.22, 1, .36, 1),
          border-color .78s cubic-bezier(.22, 1, .36, 1),
          transform .78s cubic-bezier(.22, 1, .36, 1),
          box-shadow .78s cubic-bezier(.22, 1, .36, 1);
      }
      .card:hover {
        background: linear-gradient(145deg, rgba(255,255,255,.23), rgba(255,255,255,.075));
        border-color: rgba(255,255,255,.28);
        transform: translateY(-4px);
        box-shadow: 0 42px 110px rgba(0,0,0,.48), inset 0 0 80px rgba(255,255,255,.055);
      }
      .card strong {
        display: block;
        max-width: 90%;
        margin-bottom: clamp(2px, .7vw, 10px);
        text-align: center;
        font-size: clamp(10px, 1vw, 14px);
        line-height: 1.18;
        letter-spacing: .12em;
        text-transform: uppercase;
        font-weight: 650;
        color: rgba(255,255,255,.78);
        transition: color .78s cubic-bezier(.22, 1, .36, 1), transform .78s cubic-bezier(.22, 1, .36, 1);
      }
      .card:hover strong {
        color: rgba(255,255,255,.94);
        transform: translateY(-2px);
      }
      @media (max-width: 700px) {
        :root, body, a, button, .card { cursor: auto; }
        .cursor-ring, .cursor-dot { display: none; }
        header { align-items: flex-start; flex-direction: column; }
        main { padding: 20px 14px calc(34px + env(safe-area-inset-bottom)); }
        .lead { margin-bottom: 24px; }
        .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .card { border-radius: 14px; padding: 8px; }
        .card strong { font-size: 8px; letter-spacing: .08em; line-height: 1.1; }
      }
    </style>
  </head>
  <body>
    <div class="cursor-ring" aria-hidden="true"></div>
    <div class="cursor-dot" aria-hidden="true"></div>
    <header>
      <a class="back" href="/">← Back to KAJA</a>
      <span style="color:rgba(255,255,255,.48);font-size:12px;letter-spacing:.16em;text-transform:uppercase">Catalogue</span>
    </header>
    <main>
      <h1>Catalogue</h1>
      <p class="lead">Same-size flavour boxes. Replace the placeholders below with your final flavour names, images, and product details.</p>
      <section class="grid" aria-label="Flavour catalogue">
        <article class="card"><strong>Classic Mint</strong></article>
        <article class="card"><strong>Fresh Berry</strong></article>
        <article class="card"><strong>Citrus Ice</strong></article>
        <article class="card"><strong>Vanilla Smoke</strong></article>
        <article class="card"><strong>Dark Cherry</strong></article>
        <article class="card"><strong>Green Apple</strong></article>
        <article class="card"><strong>Polar Grape</strong></article>
        <article class="card"><strong>Peach Frost</strong></article>
      </section>
    </main>
    <script>
      const ring = document.querySelector('.cursor-ring');
      const dot = document.querySelector('.cursor-dot');
      const mouse = { x: innerWidth / 2, y: innerHeight / 2 };
      const pos = { x: mouse.x, y: mouse.y };
      const prev = { x: mouse.x, y: mouse.y };
      addEventListener('mousemove', (event) => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        if (dot) dot.style.transform = `translate3d(${event.clientX}px, ${event.clientY}px, 0) translate(-50%, -50%)`;
      });
      function tick() {
        pos.x += (mouse.x - pos.x) * 0.17;
        pos.y += (mouse.y - pos.y) * 0.17;
        const dx = mouse.x - prev.x;
        const dy = mouse.y - prev.y;
        const speed = Math.min(Math.hypot(dx, dy), 80);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const stretch = 1 + speed / 210;
        const squash = 1 - speed / 420;
        if (ring) ring.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0) translate(-50%, -50%) rotate(${angle}deg) scale(${stretch}, ${squash})`;
        prev.x += dx * 0.35;
        prev.y += dy * 0.35;
        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
